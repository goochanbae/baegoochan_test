<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UX Spatial Viewer V1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    html, body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 32%),
        #06121d;
      color: #eff6ff;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    function App() {
      const [url, setUrl] = useState('https://saltcake.com');
      const [status, setStatus] = useState(null);
      const [result, setResult] = useState(null);
      const [clickable, setClickable] = useState([]);
      const [cards, setCards] = useState([]);
      const [overflow, setOverflow] = useState([]);
      const [message, setMessage] = useState('');

      async function loadAll() {
        const [statusRes, resultRes, clickableRes, cardsRes, overflowRes] = await Promise.all([
          fetch('/api/status'),
          fetch('/api/result'),
          fetch('/api/clickable'),
          fetch('/api/cards'),
          fetch('/api/overflow')
        ]);

        if (statusRes.ok) setStatus(await statusRes.json());
        if (resultRes.ok) setResult(await resultRes.json());
        if (clickableRes.ok) setClickable(await clickableRes.json());
        if (cardsRes.ok) setCards(await cardsRes.json());
        if (overflowRes.ok) setOverflow(await overflowRes.json());
      }

      useEffect(() => {
        loadAll();
      }, []);

      useEffect(() => {
        const timer = setInterval(async () => {
          const res = await fetch('/api/status');
          if (!res.ok) return;
          const next = await res.json();
          setStatus(next);
          if (!next.running) {
            await loadAll();
          }
        }, 3000);
        return () => clearInterval(timer);
      }, []);

      async function startAnalysis() {
        setMessage('');
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url.trim() })
        });
        const data = await res.json();
        if (!res.ok) {
          setMessage(data.error || 'V1 분석 시작에 실패했습니다.');
          return;
        }
        setStatus(data.status);
        setMessage('V1 분석을 시작했습니다.');
      }

      const summary = result?.Summary || result?.summary || '아직 결과가 없습니다.';
      const problems = result?.Problems || [];
      const improvements = result?.Improvements || [];
      const keyMessages = result?.KeyMessages || [];
      const logs = useMemo(() => (status?.logs || []).slice(-30).join('\n'), [status]);

      return (
        <div className="min-h-screen px-6 py-6">
          <div className="mx-auto max-w-7xl">
            <div className="mb-6 flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
              <div>
                <a href="/" className="text-sm text-cyan-200 hover:text-cyan-100">버전 선택으로 돌아가기</a>
                <div className="mt-3 text-xs uppercase tracking-[0.32em] text-cyan-200/70">Version 1</div>
                <h1 className="mt-2 text-3xl font-semibold tracking-tight text-white">V1 DOM + OpenRouter</h1>
                <p className="mt-2 text-slate-300">기존 분석 흐름을 그대로 유지한 대시보드입니다.</p>
              </div>
              <div className="rounded-full border border-cyan-300/30 bg-cyan-300/10 px-4 py-2 text-sm text-cyan-100">
                상태: <strong>{status?.running ? '실행 중' : '대기 중'}</strong>
              </div>
            </div>

            <section className="mb-6 rounded-[28px] border border-white/10 bg-[#0b1726] p-4">
              <div className="flex flex-col gap-3 lg:flex-row">
                <input
                  value={url}
                  onChange={e => setUrl(e.target.value)}
                  className="flex-1 rounded-2xl border border-white/10 bg-[#111c2d] px-4 py-3 text-slate-100 outline-none focus:border-cyan-300"
                  placeholder="https://example.com"
                />
                <button
                  type="button"
                  onClick={startAnalysis}
                  disabled={status?.running}
                  className="rounded-2xl bg-cyan-300 px-5 py-3 font-semibold text-slate-950 hover:bg-cyan-200 disabled:opacity-40"
                >
                  {status?.running ? 'V1 분석 중...' : 'V1 분석 실행'}
                </button>
              </div>
              <div className="mt-3 text-sm text-slate-400">
                {status?.lastUrl ? `마지막 URL: ${status.lastUrl}` : '분석 대기 중'}
              </div>
              {message ? <div className="mt-2 text-sm text-slate-300">{message}</div> : null}
            </section>

            <div className="grid gap-6 xl:grid-cols-[minmax(0,1.2fr)_minmax(0,0.8fr)]">
              <div className="space-y-5">
                <section className="rounded-2xl border border-white/10 bg-[#0f1c2e] p-5">
                  <div className="text-xs uppercase tracking-[0.24em] text-slate-400">Summary</div>
                  <div className="mt-3 text-base leading-7 text-slate-100">{summary}</div>
                </section>

                <section className="rounded-2xl border border-white/10 bg-[#0f1c2e] p-5">
                  <div className="mb-4 font-semibold text-slate-100">Problems</div>
                  <div className="space-y-3">
                    {problems.length === 0 ? <div className="text-sm text-slate-500">문제 목록이 없습니다.</div> : null}
                    {problems.map(item => (
                      <div key={item.id} className="rounded-2xl border border-white/10 bg-[#0b1320] p-4">
                        <div className="flex items-center justify-between gap-3">
                          <div className="font-semibold text-slate-100">{item.title}</div>
                          <div className="text-xs uppercase text-cyan-200">{item.severity || 'info'}</div>
                        </div>
                        <div className="mt-2 text-sm leading-6 text-slate-300">{item.description}</div>
                      </div>
                    ))}
                  </div>
                </section>

                <section className="grid gap-5 lg:grid-cols-2">
                  <div className="rounded-2xl border border-white/10 bg-[#0f1c2e] p-5">
                    <div className="mb-3 font-semibold text-slate-100">Improvements</div>
                    <div className="space-y-2 text-sm leading-6 text-slate-300">
                      {improvements.length === 0 ? <div className="text-slate-500">개선안이 없습니다.</div> : improvements.map((item, index) => (
                        <div key={`improvement-${index}`}>{item}</div>
                      ))}
                    </div>
                  </div>

                  <div className="rounded-2xl border border-white/10 bg-[#0f1c2e] p-5">
                    <div className="mb-3 font-semibold text-slate-100">Key Messages</div>
                    <div className="space-y-2 text-sm leading-6 text-slate-300">
                      {keyMessages.length === 0 ? <div className="text-slate-500">핵심 메시지가 없습니다.</div> : keyMessages.map((item, index) => (
                        <div key={`message-${index}`}>{item}</div>
                      ))}
                    </div>
                  </div>
                </section>
              </div>

              <div className="space-y-5">
                <section className="rounded-2xl border border-white/10 bg-[#0f1c2e] p-5">
                  <div className="mb-3 font-semibold text-slate-100">Meta</div>
                  <pre className="overflow-auto whitespace-pre-wrap rounded-xl border border-white/10 bg-[#0b1320] p-3 text-xs text-slate-300">
                    {JSON.stringify(result?.meta || {}, null, 2)}
                  </pre>
                </section>

                <section className="rounded-2xl border border-white/10 bg-[#0f1c2e] p-5">
                  <div className="mb-3 font-semibold text-slate-100">Clickable ({clickable.length})</div>
                  <pre className="max-h-60 overflow-auto whitespace-pre-wrap rounded-xl border border-white/10 bg-[#0b1320] p-3 text-xs text-slate-300">
                    {JSON.stringify(clickable.slice(0, 12), null, 2)}
                  </pre>
                </section>

                <section className="rounded-2xl border border-white/10 bg-[#0f1c2e] p-5">
                  <div className="mb-3 font-semibold text-slate-100">Cards ({cards.length})</div>
                  <pre className="max-h-60 overflow-auto whitespace-pre-wrap rounded-xl border border-white/10 bg-[#0b1320] p-3 text-xs text-slate-300">
                    {JSON.stringify(cards.slice(0, 12), null, 2)}
                  </pre>
                </section>

                <section className="rounded-2xl border border-white/10 bg-[#0f1c2e] p-5">
                  <div className="mb-3 font-semibold text-slate-100">Overflow ({overflow.length})</div>
                  <pre className="max-h-60 overflow-auto whitespace-pre-wrap rounded-xl border border-white/10 bg-[#0b1320] p-3 text-xs text-slate-300">
                    {JSON.stringify(overflow.slice(0, 12), null, 2)}
                  </pre>
                </section>

                <section className="rounded-2xl border border-white/10 bg-[#0f1c2e] p-5">
                  <div className="mb-3 font-semibold text-slate-100">Logs</div>
                  <pre className="max-h-60 overflow-auto whitespace-pre-wrap rounded-xl border border-white/10 bg-[#0b1320] p-3 text-xs text-slate-300">
                    {logs || '로그 없음'}
                  </pre>
                </section>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
