<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UX Spatial Viewer V3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f6f8fc;
      color: #0f172a;
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="/components/TimelineBar.jsx"></script>
  <script type="text/babel" src="/components/FrameViewer.jsx"></script>
  <script type="text/babel" src="/components/V3AnalysisPanel.jsx"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const T = {
      mode: '현재 모드',
      subtitle: 'OpenRouter 기반 V3 UX 분석 현황',
      urlLabel: '분석 URL',
      historyLabel: '분석 기록',
      historyPlaceholder: '기록을 선택하세요',
      downloadPdf: 'PDF 다운로드',
      startFail: 'V3 분석 시작에 실패했습니다.',
      startMessage: 'V3 분석을 시작했습니다. 완료되면 최신 결과를 자동으로 불러옵니다.',
      buttonIdle: 'V3 분석 실행',
      buttonRunning: '분석 실행 중',
      status: '상태',
      running: '실행 중',
      idle: '대기 중',
      lastUrl: '마지막 URL',
      progressReady: '분석 준비 중',
      progressStarted: '분석 시작',
      progressDom: 'DOM 분석 완료',
      progressFrame: '프레임 수집 완료',
      progressVisual: '멀티모달 분석 진행 중',
      progressChunkPlan: '멀티모달 청크 계획 수립',
      progressChunkFallback: '청크 대체 분석 적용',
      progressSynthesis: '통합 추론 진행 중',
      progressReasonRetry: '축약 재시도 진행 중',
      progressReasonRecovered: '축약 재시도 복구 완료',
      progressDone: '분석 완료',
      logs: '실행 로그',
      noLogs: '로그가 아직 없습니다.',
      noResult: '아직 선택된 분석 결과가 없습니다. 실행하거나 기록에서 하나를 선택해주세요.',
      cardRequests: '논리 요청',
      cardAttempts: 'HTTP 시도',
      cardFrames: '프레임',
      cardRate: '429 응답',
      navTitle: 'UX Spatial Viewer',
      navOverview: 'Activity',
      navLogs: 'Logs',
      navSettings: 'Settings',
      back: '버전 선택으로 돌아가기'
    };

    function parseProgress(status) {
      const logs = status?.logs || [];
      const latest = logs[logs.length - 1] || '';
      const joined = logs.join('\n');

      if (!status?.running && status?.exitCode === 0) {
        return { label: T.progressDone, percent: 100 };
      }

      const frameCollection =
        latest.match(/프레임 수집 완료\. 프레임\s*(\d+)개/i) ||
        latest.match(/Frames:\s*(\d+)/i);
      if (frameCollection) return { label: `${T.progressFrame} (${frameCollection[1]}개)`, percent: 30 };

      const multimodalProgress =
        latest.match(/멀티모달 청크 (?:시작|완료)\s+(\d+)\/(\d+)/i) ||
        latest.match(/multimodal chunk (?:start|complete)\s+(\d+)\/(\d+)/i);
      if (multimodalProgress) {
        const current = Number(multimodalProgress[1]);
        const total = Number(multimodalProgress[2]);
        const ratio = total > 0 ? current / total : 0;
        return {
          label: `${T.progressVisual} (${current}/${total})`,
          percent: Math.min(84, Math.max(36, Math.round(32 + ratio * 48)))
        };
      }

      const chunkPlan =
        joined.match(/멀티모달 청크 계획\. 청크\s*(\d+)개,\s*청크 크기\s*(\d+)/i) ||
        joined.match(/multimodal chunk plan\. Chunks:\s*(\d+), chunk size:\s*(\d+)/i);
      if (chunkPlan) {
        return {
          label: `${T.progressChunkPlan} (${chunkPlan[1]}개)`,
          percent: 52
        };
      }

      const chunkFailed =
        latest.match(/멀티모달 청크 실패\s+(\d+)\/(\d+)/i) ||
        latest.match(/multimodal chunk failed\s+(\d+)\/(\d+)/i);
      if (chunkFailed) {
        const current = Number(chunkFailed[1]);
        const total = Number(chunkFailed[2]);
        return {
          label: `${T.progressChunkFallback} (${current}/${total})`,
          percent: Math.min(88, Math.max(60, Math.round(54 + (current / Math.max(total, 1)) * 30)))
        };
      }

      if (/통합 추론 시작/i.test(latest) || /synthesis reasoning start/i.test(latest)) {
        return { label: T.progressSynthesis, percent: 90 };
      }

      if (/축약 재시도 시작/i.test(latest) || /synthesis compact retry start/i.test(latest)) {
        return { label: T.progressReasonRetry, percent: 93 };
      }

      if (/분석이 정상적으로 완료되었습니다/i.test(latest) || /analysis completed successfully/i.test(latest)) {
        return { label: T.progressDone, percent: 100 };
      }
      if (/복구/i.test(latest) || /recovered/i.test(latest)) return { label: T.progressReasonRecovered, percent: 96 };
      if (/DOM 분석 완료/i.test(latest) || /DOM analysis complete/i.test(latest)) return { label: T.progressDom, percent: 16 };
      if (/V3 분석을 시작했습니다/i.test(latest) || /Started V3 analysis/i.test(latest)) return { label: T.progressStarted, percent: 5 };
      if (status?.running) return { label: T.progressReady, percent: 3 };
      return { label: T.idle, percent: 0 };
    }

    function formatRunMeta(result) {
      const meta = result?.analysis_meta;
      return {
        logicalCalls: meta?.openrouter_requests?.logicalCalls ?? 0,
        httpAttempts: meta?.openrouter_requests?.httpAttempts ?? 0,
        frames: meta?.multimodal?.frame_count ?? result?.timeline?.length ?? 0,
        rateLimitErrors: meta?.openrouter_requests?.rateLimitErrors ?? 0
      };
    }

    function normalizeV3Result(data) {
      if (!data || !Array.isArray(data.timeline)) return data;
      return {
        ...data,
        timeline: data.timeline.map(frame => ({
          ...frame,
          image: typeof frame?.image === 'string' && frame.image.startsWith('/v2/frames/')
            ? frame.image.replace('/v2/frames/', '/v3/frames/')
            : frame.image
        }))
      };
    }

    function MetricCard({ label, value, accent }) {
      return (
        <section className="rounded-[22px] border border-slate-200 bg-white p-4 shadow-sm">
          <div className="text-sm font-medium text-slate-500">{label}</div>
          <div className={`mt-2 text-3xl font-semibold tracking-tight ${accent || 'text-slate-900'}`}>{value}</div>
        </section>
      );
    }

    function App() {
      const [status, setStatus] = useState(null);
      const [result, setResult] = useState(null);
      const [historyItems, setHistoryItems] = useState([]);
      const [selectedHistoryId, setSelectedHistoryId] = useState('');
      const [url, setUrl] = useState('https://saltcake.com');
      const [selectedFrameIndex, setSelectedFrameIndex] = useState(0);
      const [selectedIssue, setSelectedIssue] = useState(null);
      const [autoplay, setAutoplay] = useState(false);
      const [message, setMessage] = useState('');
      const [pendingAutoLoadUrl, setPendingAutoLoadUrl] = useState('');
      const [lastCompletedRunKey, setLastCompletedRunKey] = useState('');

      async function loadStatus() {
        const res = await fetch('/api/v3/status');
        if (!res.ok) return;
        setStatus(await res.json());
      }

      async function loadHistory() {
        const res = await fetch('/api/v3/history');
        if (!res.ok) return;
        setHistoryItems(await res.json());
      }

      async function loadHistoryResult(id) {
        if (!id) {
          setResult(null);
          setSelectedHistoryId('');
          setSelectedFrameIndex(0);
          setSelectedIssue(null);
          return;
        }

        const res = await fetch(`/api/v3/history/${encodeURIComponent(id)}`);
        if (!res.ok) return;
        const data = normalizeV3Result(await res.json());
        setResult(data);
        setSelectedHistoryId(id);
        setSelectedFrameIndex(0);
        setSelectedIssue(null);
      }

      useEffect(() => {
        loadStatus();
        loadHistory();
      }, []);

      useEffect(() => {
        const timer = setInterval(async () => {
          const res = await fetch('/api/v3/status');
          if (!res.ok) return;
          const nextStatus = await res.json();
          setStatus(nextStatus);
          if (nextStatus?.running) return;
          await loadHistory();
        }, 3000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (!pendingAutoLoadUrl || !status || status.running || status.exitCode !== 0) return;
        const runKey = `${status.endedAt || ''}|${status.lastUrl || ''}`;
        if (!runKey || runKey === lastCompletedRunKey) return;

        (async () => {
          const res = await fetch('/api/v3/history');
          if (!res.ok) return;
          const items = await res.json();
          setHistoryItems(items);
          const latestMatch = items.find(item => item.url === pendingAutoLoadUrl) || items[0];
          if (latestMatch?.id) {
            await loadHistoryResult(latestMatch.id);
            setMessage('최신 분석 결과를 불러왔습니다.');
          }
          setLastCompletedRunKey(runKey);
          setPendingAutoLoadUrl('');
        })();
      }, [status, pendingAutoLoadUrl, lastCompletedRunKey]);

      useEffect(() => {
        if (!autoplay || !result?.timeline?.length) return;
        const timer = setInterval(() => {
          setSelectedFrameIndex(current => (current + 1) % result.timeline.length);
        }, 1800);
        return () => clearInterval(timer);
      }, [autoplay, result]);

      const frames = result?.timeline || [];
      const overlays = useMemo(() => {
        const dom = result?.dom_analysis || {};
        return [...(dom.clickable || []), ...(dom.cards || [])];
      }, [result]);
      const highlightedElementIds = useMemo(() => {
        if (!selectedIssue) return [];
        return (selectedIssue.related_elements || []).map(item => item.id);
      }, [selectedIssue]);
      const progress = useMemo(() => parseProgress(status), [status]);
      const metrics = useMemo(() => formatRunMeta(result), [result]);

      async function startAnalysis() {
        setMessage('');
        setResult(null);
        setSelectedHistoryId('');
        setSelectedFrameIndex(0);
        setSelectedIssue(null);
        setPendingAutoLoadUrl(url.trim());
        const res = await fetch('/api/analyze-v3', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url.trim() })
        });
        const data = await res.json();
        if (!res.ok) {
          setPendingAutoLoadUrl('');
          setMessage(data.error || T.startFail);
          return;
        }
        setStatus(data.status);
        setMessage(T.startMessage);
      }

      function selectIssue(issue) {
        setSelectedIssue(issue);
        if (Number.isInteger(issue.frame_index)) setSelectedFrameIndex(issue.frame_index);
      }

      function downloadPdf() {
        const query = selectedHistoryId ? `?id=${encodeURIComponent(selectedHistoryId)}` : '';
        window.open(`/api/v3/export/pdf${query}`, '_blank', 'noopener,noreferrer');
      }

      const currentFrame = frames[selectedFrameIndex] || null;

      return (
        <div className="flex min-h-screen bg-[#f6f8fc] text-slate-900">
          <aside className="hidden w-56 shrink-0 border-r border-slate-200 bg-[#fbfcfe] xl:flex xl:flex-col">
            <div className="border-b border-slate-200 px-5 py-5">
              <div className="text-[22px] font-semibold tracking-tight text-slate-900">OpenRouter</div>
              <div className="mt-1 text-sm text-slate-500">{T.navTitle}</div>
            </div>
            <nav className="flex-1 px-3 py-4 text-sm">
              <a href="/" className="mb-2 block rounded-2xl px-4 py-3 font-medium text-slate-700 hover:bg-slate-100">{T.back}</a>
              <div className="mb-2 rounded-2xl bg-slate-100 px-4 py-3 font-semibold text-slate-900">{T.navOverview}</div>
              <div className="mb-2 rounded-2xl px-4 py-3 text-slate-300">{T.navLogs}</div>
              <div className="rounded-2xl px-4 py-3 text-slate-300">{T.navSettings}</div>
            </nav>
          </aside>

          <main className="min-w-0 flex-1">
            <div className="p-4 md:p-5 xl:p-6">
              <section className="rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm">
                <div className="flex flex-col gap-4 xl:flex-row xl:items-start xl:justify-between">
                  <div className="max-w-2xl">
                    <div className="text-[22px] font-semibold tracking-tight text-slate-950">Activity</div>
                    <p className="mt-1 text-sm text-slate-400">{T.subtitle}</p>
                  </div>
                  <div className="grid w-full max-w-2xl grid-cols-1 gap-3 lg:grid-cols-[minmax(0,1fr)_170px]">
                    <div>
                      <div className="mb-1.5 text-sm font-medium text-slate-500">{T.urlLabel}</div>
                      <input
                        value={url}
                        onChange={e => setUrl(e.target.value)}
                        className="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-slate-900 outline-none transition focus:border-sky-300 focus:bg-white"
                        placeholder="https://example.com"
                      />
                    </div>
                    <div className="flex items-end">
                      <button
                        type="button"
                        onClick={startAnalysis}
                        disabled={status?.running}
                        className="w-full rounded-2xl bg-slate-950 px-5 py-2.5 font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-50"
                      >
                        {status?.running ? T.buttonRunning : T.buttonIdle}
                      </button>
                    </div>
                  </div>
                </div>

                <div className="mt-4 grid gap-3 lg:grid-cols-[minmax(0,1fr)_280px]">
                  <div className="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                    <div className="flex items-center justify-between gap-4">
                      <div className="text-sm font-medium text-slate-700">{progress.label}</div>
                      <div className="text-sm font-semibold text-slate-900">{progress.percent}%</div>
                    </div>
                    <div className="mt-2 h-2 rounded-full bg-slate-200">
                      <div className="h-2 rounded-full bg-sky-500 transition-all duration-500" style={{ width: `${progress.percent}%` }} />
                    </div>
                    <div className="mt-2 text-sm text-slate-500">
                      {T.status}: {status?.running ? T.running : T.idle}
                      {status?.lastUrl ? ` / ${T.lastUrl}: ${status.lastUrl}` : ''}
                    </div>
                    {message ? <div className="mt-1.5 text-sm text-slate-600">{message}</div> : null}
                  </div>

                  <div>
                    <div className="mb-1.5 flex items-center justify-between gap-3">
                      <div className="text-sm font-medium text-slate-500">{T.historyLabel}</div>
                      <button
                        type="button"
                        onClick={downloadPdf}
                        disabled={!result}
                        className="rounded-xl border border-slate-200 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-40"
                      >
                        {T.downloadPdf}
                      </button>
                    </div>
                    <select
                      value={selectedHistoryId}
                      onChange={e => loadHistoryResult(e.target.value)}
                      className="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-slate-900 outline-none transition focus:border-sky-300 focus:bg-white"
                    >
                      <option value="">{T.historyPlaceholder}</option>
                      {historyItems.map(item => (
                        <option key={item.id} value={item.id}>
                          {`${item.createdAt} / ${item.url}`}
                        </option>
                      ))}
                    </select>
                  </div>
                </div>
              </section>

              <section className="mt-4 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                <MetricCard label={T.cardRequests} value={metrics.logicalCalls} accent="text-slate-950" />
                <MetricCard label={T.cardAttempts} value={metrics.httpAttempts} accent="text-sky-600" />
                <MetricCard label={T.cardFrames} value={metrics.frames} accent="text-emerald-600" />
                <MetricCard label={T.cardRate} value={metrics.rateLimitErrors} accent="text-amber-600" />
              </section>

              <section className="mt-4 grid grid-cols-1 items-start gap-6 xl:h-[calc(100vh-2rem)] xl:overflow-hidden xl:grid-cols-[minmax(0,1fr)_430px]">
                <div className="min-w-0 xl:h-full">
                  <div className="space-y-5 xl:sticky xl:top-0 xl:h-full xl:overflow-y-auto xl:pr-1">
                    <window.FrameViewer
                      frame={currentFrame}
                      frames={frames}
                      overlays={overlays}
                      highlightedElementIds={highlightedElementIds}
                      onPrev={() => setSelectedFrameIndex(current => Math.max(0, current - 1))}
                      onNext={() => setSelectedFrameIndex(current => Math.min(Math.max(0, frames.length - 1), current + 1))}
                      onToggleAutoplay={() => setAutoplay(v => !v)}
                      autoplay={autoplay}
                      onElementSelect={id => {
                        if (!result) return;
                        const issue = (result?.enhanced_issues || []).find(item =>
                          (item.related_elements || []).some(rel => rel.id === id)
                        );
                        if (issue) selectIssue(issue);
                      }}
                    />
                    <window.TimelineBar frames={frames} selectedIndex={selectedFrameIndex} onSelect={setSelectedFrameIndex} />
                    {!result ? (
                      <section className="rounded-[28px] border border-dashed border-slate-300 bg-white p-8 text-center text-slate-500 shadow-sm">
                        {T.noResult}
                      </section>
                    ) : null}
                  </div>
                </div>

                <div className="min-w-0 xl:h-full xl:overflow-y-auto xl:pr-1">
                  <div className="space-y-5">
                    <window.V3AnalysisPanel
                      result={result}
                      selectedIssueId={selectedIssue?.id}
                      onSelectIssue={selectIssue}
                      selectedFrameIndex={selectedFrameIndex}
                    />
                    <section className="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
                      <div className="mb-3 font-semibold text-slate-900">{T.logs}</div>
                      <pre className="max-h-[320px] overflow-auto whitespace-pre-wrap rounded-2xl border border-slate-200 bg-slate-50 p-3 text-xs leading-6 text-slate-700">
                        {(status?.logs || []).slice(-40).join('\n') || T.noLogs}
                      </pre>
                    </section>
                  </div>
                </div>
              </section>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
