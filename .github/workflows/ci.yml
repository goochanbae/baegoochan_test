name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static checks
        run: npm run check

      - name: Start server
        run: |
          nohup npm start > server.log 2>&1 &
          echo $! > server.pid
          sleep 8

      - name: Smoke test endpoints
        run: |
          curl -f http://127.0.0.1:3000/
          curl -f http://127.0.0.1:3000/v3
          curl -f http://127.0.0.1:3000/api/v3/status

      - name: Print server log on failure
        if: failure()
        run: cat server.log

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
